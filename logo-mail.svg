<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F2240"/>
    </linearGradient>
    <linearGradient id="a-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Icône flèche stylisée (parallélogramme + flèche) -->
  <g transform="translate(20, 30)">
    <!-- Parallélogramme du bas (cyan) -->
    <path d="M 20 70 L 70 20 L 110 20 L 60 70 Z" fill="url(#cyan-grad)"/>
    <!-- Parallélogramme du milieu (navy) -->
    <path d="M 0 90 L 50 40 L 90 40 L 40 90 Z" fill="url(#navy-grad)"/>
    <!-- Flèche pointe (cyan) -->
    <path d="M 80 5 L 110 5 L 110 35 L 100 25 L 85 40 L 75 30 L 90 15 Z" fill="url(#cyan-grad)"/>
    <!-- Flèche pointe (navy, derrière) -->
    <path d="M 95 0 L 125 0 L 125 30 L 115 20 L 100 35 L 90 25 L 105 10 Z" fill="url(#navy-grad)"/>
  </g>

  <!-- Texte NEOVA -->
  <g transform="translate(180, 0)">
    <text x="0" y="125" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="84" font-weight="800" letter-spacing="-2" fill="#1E3A5F">NEOV</text>
    <text x="240" y="125" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="84" font-weight="800" letter-spacing="-2" fill="url(#a-grad)">A</text>
  </g>
</svg>
