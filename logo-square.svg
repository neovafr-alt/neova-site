<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="75%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="va-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="#000000"/>
  <rect width="400" height="400" fill="url(#grid)"/>

  <circle cx="120" cy="120" r="180" fill="url(#bg1)"/>
  <circle cx="300" cy="300" r="160" fill="url(#bg2)"/>

  <text x="200" y="225" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="68" font-weight="700" letter-spacing="8" fill="#FFFFFF" text-anchor="middle">
    NEO<tspan fill="url(#va-grad)">VA</tspan>
  </text>
</svg>
