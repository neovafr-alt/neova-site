<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fond noir -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Grille subtile -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Orbes glow -->
  <circle cx="240" cy="190" r="280" fill="url(#bg1)"/>
  <circle cx="960" cy="500" r="260" fill="url(#bg2)"/>

  <!-- Logo NEOVA en haut -->
  <text x="80" y="100" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="700" letter-spacing="6" fill="#FFFFFF">
    NEO<tspan fill="#0EA5E9">VA</tspan>
  </text>

  <!-- Pill Agence IA -->
  <rect x="80" y="240" width="280" height="38" rx="19" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="220" y="265" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#0EA5E9" text-anchor="middle">AGENCE IA &amp; AUTOMATISATION</text>

  <!-- Titre principal -->
  <text x="80" y="370" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="76" font-weight="700" letter-spacing="-2" fill="#FFFFFF">Automatisez votre</text>
  <text x="80" y="460" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="76" font-weight="700" letter-spacing="-2" fill="url(#accentGrad)">croissance digitale.</text>

  <!-- Sous-titre -->
  <text x="80" y="540" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)">Workflows IA · SEO · Outils sur mesure · Prospection automatisée</text>

  <!-- Bordure bleue en bas -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accentGrad)"/>
</svg>
